<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printos Splash Screen</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { DEFAULT: '#c4161c', dark: '#a01217', light: '#fef2f2' },
                        dark: '#0f172a',
                        printosGray: '#444b4c',
                        printosRed: '#c4161c'
                    }
                }
            }
        }
    </script>
    
    <!-- React & Animation Libraries -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            margin: 0;
            overflow: hidden;
        }

        /* SVG path drawing preparation */
        .draw-target {
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            fill-opacity: 0;
        }

        .fade-in-content {
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function Preloader({ onComplete }) {
            const scope = useRef();

            useEffect(() => {
                const ctx = gsap.context(() => {
                    const tl = gsap.timeline({
                        onComplete: onComplete
                    });

                    // 1. Initial State for whole container
                    gsap.set(".logo-svg, .brand-svg", { opacity: 1 });
                    
                    // 2. Draw the Icon first
                    tl.to(".icon-draw", {
                        strokeDashoffset: 0,
                        duration: 1.5,
                        ease: "power2.inOut",
                        stagger: 0.1
                    })
                    // 3. Draw the Brand Name Text SVG
                    .to(".text-draw", {
                        strokeDashoffset: 0,
                        duration: 1.2,
                        ease: "power2.out",
                        stagger: 0.02
                    }, "-=0.8")
                    // 4. Fill the colors for both
                    .to(".draw-target", {
                        fillOpacity: 1,
                        strokeWidth: 0,
                        duration: 0.6,
                        ease: "power1.out"
                    })
                    // 5. Scale up effect before exit
                    .to(".preloader-content", {
                        scale: 1.05,
                        duration: 2,
                        ease: "power1.inOut"
                    }, "-=0.5")
                    // 6. Exit Transition (Slide Up)
                    .to(".preloader-bg", {
                        yPercent: -100,
                        duration: 1,
                        ease: "expo.inOut"
                    })
                    .to(".preloader-content", {
                        y: -100,
                        opacity: 0,
                        duration: 0.6,
                        ease: "power2.in"
                    }, "<");

                }, scope);
                
                return () => ctx.revert();
            }, [onComplete]);
